{{ define "user_new.html" }}
{{ template "header" . }}

<div class="max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/users" class="inline-flex items-center gap-1 text-base text-gray-400 hover:text-gray-600 transition-colors whitespace-nowrap">
      <span class="material-symbols-outlined text-lg">arrow_back</span> 一覧へ戻る
    </a>
  </div>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">ユーザ新規作成</h1>

  {{- if .errors }}
  <div class="mb-6 rounded-lg border-l-4 border-red-500 bg-red-50 px-4 py-3">
    <p class="text-base font-semibold text-red-700 mb-1">入力エラー</p>
    <ul class="list-disc list-inside space-y-0.5">
      {{- range .errors }}
      <li class="text-base text-red-600">{{ . }}</li>
      {{- end }}
    </ul>
  </div>
  {{- end }}

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
    <form method="POST" action="/users" novalidate>
      <div class="mb-5">
        <label for="name" class="block text-base font-medium text-gray-700 mb-1">
          名前 <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ if .input }}{{ index .input "name" }}{{ end }}"
          placeholder="例: 山田 太郎"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-base text-gray-800 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="mb-6">
        <label for="email" class="block text-base font-medium text-gray-700 mb-1">
          メールアドレス <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ if .input }}{{ index .input "email" }}{{ end }}"
          placeholder="例: taro@example.com"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-base text-gray-800 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex items-center gap-3 pt-1">
        <button type="submit"
                class="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-base font-semibold px-4 py-2 rounded-lg shadow-sm transition-colors whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
          <span class="material-symbols-outlined text-lg">check</span> 登録する
        </button>
        <a href="/users"
           class="inline-flex items-center gap-1.5 text-base text-gray-500 hover:text-gray-700 px-4 py-2 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-1">
          <span class="material-symbols-outlined text-lg">close</span> キャンセル
        </a>
      </div>
    </form>
  </div>
</div>

{{ template "footer" . }}
{{ end }}
