{{ define "header" }}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .page_title }} - {{ .app_name }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen antialiased">

  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-6 flex items-stretch justify-between" style="height: calc(var(--spacing) * 20);">
      <a href="/users"
         class="flex items-center gap-2 text-lg font-bold text-blue-600 hover:text-blue-700 tracking-tight transition-colors whitespace-nowrap">
        <span class="material-symbols-outlined" style="font-size:40px">group</span>
        {{ .app_name }}
      </a>
      <nav class="flex items-stretch">
        <a href="/users"
           class="flex items-center text-base text-gray-600 hover:text-blue-600 font-medium px-3 border-b-2 border-transparent hover:border-blue-500 transition-colors whitespace-nowrap">
          ユーザ一覧
        </a>
        <a href="/users/new"
           class="flex items-center text-base text-gray-600 hover:text-blue-600 font-medium px-3 border-b-2 border-transparent hover:border-blue-500 transition-colors whitespace-nowrap">
          新規作成
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
{{ end }}
